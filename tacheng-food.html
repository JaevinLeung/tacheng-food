    { id: 'huoguo', name: '火锅', emoji: '\uD83C\uDF72', tag: '聚餐首选' },
    { id: 'bingqilin', name: '冰激凌', emoji: '\uD83C\uDF68', tag: '甜蜜享受' },
    { id: 'shaokao', name: '烧烤', emoji: '\uD83E\uDD6B', tag: '夜宵灵魂' }
  ];

  const DEFAULT_DATA = {
    shops: {},
    votes: {},
    comments: []
  };

  // Initialize data
  function loadData() {
    try {
      const saved = localStorage.getItem('tacheng_food_data');
      if (saved) {
        const parsed = JSON.parse(saved);
        return { ...DEFAULT_DATA, ...parsed };
      }
    } catch(e) {}
    return JSON.parse(JSON.stringify(DEFAULT_DATA));
  }

  function saveData() {
    localStorage.setItem('tacheng_food_data', JSON.stringify(appData));
  }

  let appData = loadData();
  let pendingVote = null;

  // BroadcastChannel for real-time sync across tabs
  let channel = null;
  try {
    channel = new BroadcastChannel('tacheng_food_sync');
    channel.onmessage = function(e) {
      appData = loadData();
      renderAll();
      showToast('数据已同步更新');
    };
  } catch(e) {
    // BroadcastChannel not supported, fallback to polling
    setInterval(function() {
      const fresh = loadData();
      if (JSON.stringify(fresh) !== JSON.stringify(appData)) {
        appData = fresh;
        renderAll();
      }
    }, 2000);
  }

  function broadcastUpdate() {
    if (channel) {
      channel.postMessage({ timestamp: Date.now() });
    }
  }

  // ========== Particles ==========
  function createParticles() {
    var container = document.getElementById('particles');
    var foodEmojis = ['\uD83C\uDF5C', '\uD83C\uDF57', '\uD83E\uDD6B', '\uD83C\uDF68', '\uD83E\uDD64', '\uD83C\uDF72', '\uD83E\uDD56', '\uD83E\uDD57'];
    for (var i = 0; i < 15; i++) {
      var p = document.createElement('span');
      p.className = 'particle';
      p.textContent = foodEmojis[Math.floor(Math.random() * foodEmojis.length)];
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDuration = (15 + Math.random() * 20) + 's';
      p.style.animationDelay = Math.random() * 15 + 's';
      p.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
      container.appendChild(p);
    }
  }

  // ========== Toast ==========
  window.showToast = function(msg) {
    var container = document.getElementById('toastContainer');
    var toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    container.appendChild(toast);
    setTimeout(function() {
      if (toast.parentNode) toast.parentNode.removeChild(toast);
    }, 3000);
  };

  // ========== Tab Switching ==========
  window.switchTab = function(tab) {
    var tabs = document.querySelectorAll('.nav-tab');
    tabs.forEach(function(t) { t.classList.remove('active'); });
    if (tab === 'vote') {
      tabs[0].classList.add('active');
      document.getElementById('section-vote').style.display = '';
      document.getElementById('section-rank').classList.remove('visible');
      document.getElementById('section-comment').classList.remove('visible');
    } else if (tab === 'rank') {
      tabs[1].classList.add('active');
      document.getElementById('section-vote').style.display = 'none';
      document.getElementById('section-rank').classList.add('visible');
      renderRankings();
    } else if (tab === 'comment') {
      tabs[2].classList.add('active');
      document.getElementById('section-vote').style.display = 'none';
      document.getElementById('section-rank').classList.remove('visible');
      document.getElementById('section-comment').classList.add('visible');
    }
  };

  // ========== Render Food Grid ==========
  function renderFoodGrid() {
    var grid = document.getElementById('foodGrid');
    grid.innerHTML = '';

    FOODS.forEach(function(food) {
      var shops = appData.shops[food.id] || [];
      var card = document.createElement('div');
      card.className = 'food-card';

      var totalCardVotes = shops.reduce(function(sum, s) { return sum + (s.votes || 0); }, 0);

      var header = '<div class="card-header">' +
        '<div class="card-header-left">' +
          '<div class="food-emoji">' + food.emoji + '</div>' +
          '<div><div class="food-name">' + food.name + '</div><span class="food-tag">' + food.tag + '</span></div>' +
        '</div>' +
        '<span class="vote-count-badge">' + totalCardVotes + ' 票</span>' +
      '</div>';

      var shopListHtml = '<div class="shop-list">';
      if (shops.length === 0) {
        shopListHtml += '<div class="empty-state">暂无推荐，快来推荐一家吧！</div>';
      } else {
        // Sort shops by votes
        var sortedShops = shops.slice().sort(function(a, b) { return (b.votes || 0) - (a.votes || 0); });
        sortedShops.forEach(function(shop, idx) {
          shopListHtml += '<div class="shop-item">' +
            '<div class="shop-info">' +
              '<div class="shop-name">' + (idx === 0 && shop.votes > 0 ? '&#x1F3C6; ' : '') + escapeHtml(shop.name) + '</div>' +
              '<div class="shop-recommender">推荐人：' + escapeHtml(shop.recommender) + '</div>' +
            '</div>' +
            '<div class="shop-votes">' +
              '<span class="vote-num">' + (shop.votes || 0) + '</span>' +
              '<button class="vote-btn" onclick="voteShop(\'' + food.id + '\',' + shop.id + ')" title="投票">&#10084;</button>' +
            '</div>' +
          '</div>';
        });
      }
      shopListHtml += '</div>';

      var formHtml = '<div class="add-shop-form">' +
        '<div class="form-row">' +
          '<input class="form-input" id="name-' + food.id + '" placeholder="店铺名称" maxlength="30">' +
          '<input class="form-input" id="rec-' + food.id + '" placeholder="你的昵称" maxlength="20" style="max-width:120px;">' +
          '<button class="submit-btn" onclick="addShop(\'' + food.id + '\')">推荐</button>' +
        '</div>' +
      '</div>';

      card.innerHTML = header + shopListHtml + formHtml;
      grid.appendChild(card);
    });
  }

  function escapeHtml(text) {
    var div = document.createElement('div');
    div.textContent = text || '';
    return div.innerHTML;
  }

  // ========== Add Shop ==========
  window.addShop = function(foodId) {
    var nameInput = document.getElementById('name-' + foodId);
    var recInput = document.getElementById('rec-' + foodId);
    var name = nameInput.value.trim();
    var recommender = recInput.value.trim() || '匿名美食家';

    if (!name) {
      showToast('请填写店铺名称');
      nameInput.focus();
      return;
    }

    if (!appData.shops[foodId]) {
      appData.shops[foodId] = [];
    }

    // Check duplicate
    var exists = appData.shops[foodId].some(function(s) {
      return s.name.toLowerCase() === name.toLowerCase();
    });
    if (exists) {
      showToast('该店铺已被推荐过了');
      return;
    }

    var newId = Date.now();
    appData.shops[foodId].push({
      id: newId,
      name: name,
      recommender: recommender,
      votes: 0,
      createdAt: new Date().toISOString()
    });

    saveData();
    broadcastUpdate();
    renderAll();
    showToast('成功推荐「' + name + '」');

    nameInput.value = '';
    recInput.value = '';
  };

  // ========== Vote for Shop ==========
  window.voteShop = function(foodId, shopId) {
    var shops = appData.shops[foodId] || [];
    var shop = shops.find(function(s) { return s.id === shopId; });
    if (!shop) return;

    shop.votes = (shop.votes || 0) + 1;
    saveData();
    broadcastUpdate();
    renderAll();

    var food = FOODS.find(function(f) { return f.id === foodId; });
    showToast('为「' + shop.name + '」(' + (food ? food.name : '') + ') 投了一票！');
  };

  // ========== Rankings ==========
  function renderRankings() {
    var list = document.getElementById('rankingsList');
    var allShops = [];

    FOODS.forEach(function(food) {
      var shops = appData.shops[food.id] || [];
      shops.forEach(function(shop) {
        allShops.push({
          name: shop.name,
          category: food.name,
          votes: shop.votes || 0
        });
      });
    });

    allShops.sort(function(a, b) { return b.votes - a.votes; });

    if (allShops.length === 0) {
      list.innerHTML = '<div class="empty-state">暂无投票数据，快去为你喜欢的美食投票吧！</div>';
      return;
    }

    var html = '';
    allShops.forEach(function(shop, idx) {
      var rankClass = idx === 0 ? 'rank-1' : idx === 1 ? 'rank-2' : idx === 2 ? 'rank-3' : 'rank-other';
      html += '<div class="ranking-item">' +
        '<div class="rank-num ' + rankClass + '">' + (idx + 1) + '</div>' +
        '<div class="rank-info">' +
          '<div class="rank-shop-name">' + escapeHtml(shop.name) + '</div>' +
          '<div class="rank-category">' + shop.category + '</div>' +
        '</div>' +
        '<div class="rank-votes">' + shop.votes + ' 票</div>' +
      '</div>';
    });

    list.innerHTML = html;
  }

  // ========== Comments ==========
  window.addComment = function() {
    var text = document.getElementById('commentText').value.trim();
    var author = document.getElementById('commentAuthor').value.trim() || '匿名食客';

    if (!text) {
      showToast('请输入评论内容');
      return;
    }

    if (!appData.comments) appData.comments = [];

    appData.comments.unshift({
      id: Date.now(),
      author: author,
      text: text,
      createdAt: new Date().toISOString()
    });

    saveData();
    broadcastUpdate();
    renderComments();
    updateStats();

    document.getElementById('commentText').value = '';
    showToast('评论发表成功');
  };

  function renderComments() {
    var list = document.getElementById('commentsList');
    var comments = appData.comments || [];

    if (comments.length === 0) {
      list.innerHTML = '<div class="empty-state">暂无评论，来分享你的美食体验吧！</div>';
      return;
    }

    var html = '';
    comments.forEach(function(c) {
      var date = new Date(c.createdAt);
      var timeStr = date.getFullYear() + '-' +
        String(date.getMonth() + 1).padStart(2, '0') + '-' +
        String(date.getDate()).padStart(2, '0') + ' ' +
        String(date.getHours()).padStart(2, '0') + ':' +
        String(date.getMinutes()).padStart(2, '0');

      html += '<div class="comment-item">' +
        '<div class="comment-header">' +
          '<span class="comment-author">' + escapeHtml(c.author) + '</span>' +
          '<span class="comment-time">' + timeStr + '</span>' +
        '</div>' +
        '<div class="comment-text">' + escapeHtml(c.text) + '</div>' +
      '</div>';
    });

    list.innerHTML = html;
  }

  // ========== Stats ==========
  function updateStats() {
    var totalShops = 0;
    var totalVotes = 0;
    FOODS.forEach(function(f) {
      var shops = appData.shops[f.id] || [];
      totalShops += shops.length;
      shops.forEach(function(s) { totalVotes += (s.votes || 0); });
    });

    document.getElementById('totalShops').textContent = totalShops;
    document.getElementById('totalVotes').textContent = totalVotes;
    document.getElementById('totalComments').textContent = (appData.comments || []).length;
  }

  // ========== Modal ==========
  window.closeModal = function() {
    document.getElementById('voteModal').classList.remove('visible');
    pendingVote = null;
  };

  window.submitModalVote = function() {
    // Placeholder for future use
    closeModal();
  };

  // Close modal on overlay click
  document.getElementById('voteModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // ========== Render All ==========
  function renderAll() {
    renderFoodGrid();
    updateStats();
    // Only render rankings/comments if visible
    if (document.getElementById('section-rank').classList.contains('visible')) {
      renderRankings();
    }
    if (document.getElementById('section-comment').classList.contains('visible')) {
      renderComments();
    }
  }

  // ========== Init ==========
  createParticles();
  renderAll();

  // Handle Enter key in inputs
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      var target = e.target;
      if (target.classList.contains('form-input') && target.id.startsWith('name-')) {
        var foodId = target.id.replace('name-', '');
        window.addShop(foodId);
      }
      if (target.id === 'commentAuthor' || (target.id === 'commentText' && e.ctrlKey)) {
        window.addComment();
      }
    }
  });

})();
</script>

</body>
</html>
